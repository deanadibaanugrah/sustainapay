<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERD SustainaPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Top Bar */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            gap: 16px;
        }
        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            color: #1a1a2e;
        }
        .topbar-logo svg { width: 22px; height: 22px; }
        .topbar-sep {
            width: 1px;
            height: 24px;
            background: #e0e0e0;
        }
        .topbar-title {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            background: #fff;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: #444;
            cursor: pointer;
            transition: all 0.15s;
        }
        .topbar-btn:hover { background: #f0f0f0; }
        .topbar-zoom {
            font-size: 12px;
            color: #888;
            font-weight: 500;
            min-width: 45px;
            text-align: center;
        }

        /* Canvas */
        #canvas-container {
            position: absolute;
            top: 48px; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            cursor: grab;
            background:
                radial-gradient(circle, #ddd 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #canvas-container.grabbing { cursor: grabbing; }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
        }

        /* SVG lines */
        #lines-svg {
            position: absolute;
            top: 0; left: 0;
            width: 4000px;
            height: 3000px;
            pointer-events: none;
        }
        #lines-svg line {
            stroke: #6c757d;
            stroke-width: 1.8;
        }
        #lines-svg .line-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            fill: #6c757d;
        }
        #lines-svg circle.rel-dot {
            fill: #6c757d;
        }

        /* Entity box */
        .entity {
            position: absolute;
            min-width: 220px;
            background: #fff;
            border: 2px solid #4a90d9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: move;
            user-select: none;
            transition: box-shadow 0.15s;
        }
        .entity:hover {
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.2);
        }
        .entity.dragging {
            box-shadow: 0 8px 24px rgba(74, 144, 217, 0.3);
            z-index: 50;
        }

        .entity-header {
            background: #4a90d9;
            color: #fff;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 14px;
            border-radius: 5px 5px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .entity-header .icon {
            font-size: 15px;
        }

        .entity-body {
            padding: 6px 0;
        }

        .entity-row {
            display: flex;
            align-items: center;
            padding: 5px 14px;
            font-size: 12.5px;
            gap: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        .entity-row:last-child { border-bottom: none; }

        .col-icon {
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }
        .col-icon.pk {
            color: #e6a817;
            font-weight: 700;
            font-size: 11px;
        }
        .col-icon.fk {
            color: #d9534f;
            font-weight: 700;
            font-size: 11px;
        }

        .col-name {
            font-weight: 600;
            color: #2c3e50;
            flex: 1;
        }
        .col-type {
            color: #888;
            font-size: 11px;
            font-weight: 500;
        }
        .col-badge {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            text-transform: uppercase;
        }
        .badge-pk {
            background: #fff3cd;
            color: #856404;
        }
        .badge-fk {
            background: #f8d7da;
            color: #842029;
        }
        .badge-uk {
            background: #d1ecf1;
            color: #0c5460;
        }
        .badge-null {
            background: #f0f0f0;
            color: #999;
        }

        /* Legend */
        .legend {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            z-index: 90;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .legend-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            color: #555;
        }
        .legend-item:last-child { margin-bottom: 0; }

        .help-hint {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 11px;
            color: #888;
            z-index: 90;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        ERD Diagram
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-title">SustainaPay — Entity Relationship Diagram</div>
    <div class="topbar-right">
        <button class="topbar-btn" onclick="zoomOut()">−</button>
        <span class="topbar-zoom" id="zoom-label">100%</span>
        <button class="topbar-btn" onclick="zoomIn()">+</button>
        <button class="topbar-btn" onclick="resetView()">Reset View</button>
    </div>
</div>

<div id="canvas-container">
    <div id="canvas">
        <svg id="lines-svg"></svg>
    </div>
</div>

<div class="legend">
    <div class="legend-title">Keterangan</div>
    <div class="legend-item"><span class="col-badge badge-pk">PK</span> Primary Key</div>
    <div class="legend-item"><span class="col-badge badge-fk">FK</span> Foreign Key</div>
    <div class="legend-item"><span class="col-badge badge-uk">UQ</span> Unique</div>
    <div class="legend-item">
        <svg width="30" height="12"><line x1="0" y1="6" x2="30" y2="6" stroke="#6c757d" stroke-width="2"/></svg>
        Relasi
    </div>
</div>

<div class="help-hint">
    💡 Drag tabel untuk memindahkan · Scroll untuk zoom · Klik & drag background untuk pan
</div>

<script>
// ==================== DATA ====================
const entities = [
    {
        id: 'users',
        label: 'users',
        icon: '👤',
        x: 500, y: 120,
        columns: [
            { name: 'id', type: 'BIGINT', pk: true },
            { name: 'name', type: 'VARCHAR' },
            { name: 'email', type: 'VARCHAR', unique: true },
            { name: 'google_id', type: 'VARCHAR', unique: true, nullable: true },
            { name: 'password', type: 'VARCHAR' },
            { name: 'role', type: 'ENUM', note: 'user/admin' },
            { name: 'wallet_balance', type: 'DECIMAL(15,2)' },
            { name: 'eco_points', type: 'INT' },
            { name: 'reward_points', type: 'INT' },
            { name: 'location', type: 'VARCHAR', nullable: true },
            { name: 'avatar', type: 'LONGTEXT', nullable: true },
            { name: 'created_at', type: 'TIMESTAMP' },
            { name: 'updated_at', type: 'TIMESTAMP' },
        ]
    },
    {
        id: 'transactions',
        label: 'transactions',
        icon: '💳',
        x: 140, y: 500,
        columns: [
            { name: 'id', type: 'BIGINT', pk: true },
            { name: 'user_id', type: 'BIGINT', fk: true },
            { name: 'transaction_code', type: 'VARCHAR', unique: true },
            { name: 'category', type: 'VARCHAR' },
            { name: 'amount', type: 'DECIMAL(15,2)' },
            { name: 'status', type: 'VARCHAR' },
            { name: 'description', type: 'VARCHAR', nullable: true },
            { name: 'created_at', type: 'TIMESTAMP' },
            { name: 'updated_at', type: 'TIMESTAMP' },
        ]
    },
    {
        id: 'carbon_records',
        label: 'carbon_records',
        icon: '🌿',
        x: 500, y: 680,
        columns: [
            { name: 'id', type: 'BIGINT', pk: true },
            { name: 'user_id', type: 'BIGINT', fk: true },
            { name: 'transaction_id', type: 'BIGINT', fk: true, nullable: true },
            { name: 'emission_factor_id', type: 'BIGINT', fk: true },
            { name: 'distance_km', type: 'DECIMAL(10,2)' },
            { name: 'calculated_carbon_kg', type: 'DECIMAL(10,2)' },
            { name: 'created_at', type: 'TIMESTAMP' },
            { name: 'updated_at', type: 'TIMESTAMP' },
        ]
    },
    {
        id: 'ai_recommendations',
        label: 'ai_recommendations',
        icon: '🤖',
        x: 870, y: 500,
        columns: [
            { name: 'id', type: 'BIGINT', pk: true },
            { name: 'user_id', type: 'BIGINT', fk: true },
            { name: 'transaction_id', type: 'BIGINT', fk: true, nullable: true },
            { name: 'total_emisi', type: 'DECIMAL(8,2)' },
            { name: 'ai_analysis', type: 'TEXT' },
            { name: 'created_at', type: 'TIMESTAMP' },
            { name: 'updated_at', type: 'TIMESTAMP' },
        ]
    },
    {
        id: 'user_vouchers',
        label: 'user_vouchers',
        icon: '🎫',
        x: 140, y: 120,
        columns: [
            { name: 'id', type: 'BIGINT', pk: true },
            { name: 'user_id', type: 'BIGINT', fk: true },
            { name: 'title', type: 'VARCHAR' },
            { name: 'provider', type: 'VARCHAR' },
            { name: 'icon', type: 'VARCHAR', nullable: true },
            { name: 'type', type: 'VARCHAR', note: 'reward/donation' },
            { name: 'cost', type: 'INT' },
            { name: 'voucher_code', type: 'VARCHAR', nullable: true },
            { name: 'created_at', type: 'TIMESTAMP' },
            { name: 'updated_at', type: 'TIMESTAMP' },
        ]
    },
    {
        id: 'personal_access_tokens',
        label: 'personal_access_tokens',
        icon: '🔑',
        x: 870, y: 120,
        columns: [
            { name: 'id', type: 'BIGINT', pk: true },
            { name: 'tokenable_type', type: 'VARCHAR' },
            { name: 'tokenable_id', type: 'BIGINT' },
            { name: 'name', type: 'TEXT' },
            { name: 'token', type: 'VARCHAR(64)', unique: true },
            { name: 'abilities', type: 'TEXT', nullable: true },
            { name: 'last_used_at', type: 'TIMESTAMP', nullable: true },
            { name: 'expires_at', type: 'TIMESTAMP', nullable: true },
            { name: 'created_at', type: 'TIMESTAMP' },
            { name: 'updated_at', type: 'TIMESTAMP' },
        ]
    },
];

const relations = [
    { from: 'users', to: 'transactions', labelFrom: '1', labelTo: 'N' },
    { from: 'users', to: 'carbon_records', labelFrom: '1', labelTo: 'N' },
    { from: 'users', to: 'ai_recommendations', labelFrom: '1', labelTo: 'N' },
    { from: 'users', to: 'user_vouchers', labelFrom: '1', labelTo: 'N' },
    { from: 'users', to: 'personal_access_tokens', labelFrom: '1', labelTo: 'N' },
    { from: 'transactions', to: 'carbon_records', labelFrom: '1', labelTo: '1' },
    { from: 'transactions', to: 'ai_recommendations', labelFrom: '1', labelTo: 'N' },
];

// ==================== RENDER ====================
const canvas = document.getElementById('canvas');
const svgEl = document.getElementById('lines-svg');
const container = document.getElementById('canvas-container');
const entityEls = {};

function renderEntity(ent) {
    const div = document.createElement('div');
    div.className = 'entity';
    div.id = 'ent-' + ent.id;
    div.style.left = ent.x + 'px';
    div.style.top = ent.y + 'px';

    let html = `<div class="entity-header"><span class="icon">${ent.icon}</span>${ent.label}</div><div class="entity-body">`;

    for (const col of ent.columns) {
        let iconHtml = '';
        let badges = '';
        if (col.pk) {
            iconHtml = '<span class="col-icon pk">🔑</span>';
            badges += '<span class="col-badge badge-pk">PK</span>';
        } else if (col.fk) {
            iconHtml = '<span class="col-icon fk">🔗</span>';
            badges += '<span class="col-badge badge-fk">FK</span>';
        } else {
            iconHtml = '<span class="col-icon"></span>';
        }
        if (col.unique) badges += '<span class="col-badge badge-uk">UQ</span>';
        if (col.nullable) badges += '<span class="col-badge badge-null">NULL</span>';

        html += `<div class="entity-row">${iconHtml}<span class="col-name">${col.name}</span><span class="col-type">${col.type}</span>${badges}</div>`;
    }

    html += '</div>';
    div.innerHTML = html;
    canvas.appendChild(div);
    entityEls[ent.id] = div;

    // Drag
    makeDraggable(div, ent);
}

function makeDraggable(el, ent) {
    let startX, startY, origX, origY;

    el.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.stopPropagation();
        startX = e.clientX;
        startY = e.clientY;
        origX = ent.x;
        origY = ent.y;
        el.classList.add('dragging');

        const onMove = (e2) => {
            const dx = (e2.clientX - startX) / scale;
            const dy = (e2.clientY - startY) / scale;
            ent.x = origX + dx;
            ent.y = origY + dy;
            el.style.left = ent.x + 'px';
            el.style.top = ent.y + 'px';
            drawLines();
        };

        const onUp = () => {
            el.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}

function getEntityCenter(id) {
    const el = entityEls[id];
    const x = parseFloat(el.style.left) + el.offsetWidth / 2;
    const y = parseFloat(el.style.top) + el.offsetHeight / 2;
    return { x, y, w: el.offsetWidth, h: el.offsetHeight, left: parseFloat(el.style.left), top: parseFloat(el.style.top) };
}

function getEdgePoint(fromRect, toRect) {
    const fx = fromRect.left + fromRect.w / 2;
    const fy = fromRect.top + fromRect.h / 2;
    const tx = toRect.left + toRect.w / 2;
    const ty = toRect.top + toRect.h / 2;

    const dx = tx - fx;
    const dy = ty - fy;

    // from edge
    let fromPt = getIntersection(fx, fy, dx, dy, fromRect);
    let toPt = getIntersection(tx, ty, -dx, -dy, toRect);

    return { x1: fromPt.x, y1: fromPt.y, x2: toPt.x, y2: toPt.y };
}

function getIntersection(cx, cy, dx, dy, rect) {
    const hw = rect.w / 2;
    const hh = rect.h / 2;

    let t = Infinity;

    if (dx !== 0) {
        const tRight = hw / Math.abs(dx);
        if (tRight < t) t = tRight;
    }
    if (dy !== 0) {
        const tBottom = hh / Math.abs(dy);
        if (tBottom < t) t = tBottom;
    }

    return {
        x: cx + dx * t,
        y: cy + dy * t
    };
}

function drawLines() {
    svgEl.innerHTML = '';

    // Arrow marker
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d"/>
        </marker>
    `;
    svgEl.appendChild(defs);

    for (const rel of relations) {
        const fromRect = getEntityCenter(rel.from);
        const toRect = getEntityCenter(rel.to);
        const pts = getEdgePoint(fromRect, toRect);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', pts.x1);
        line.setAttribute('y1', pts.y1);
        line.setAttribute('x2', pts.x2);
        line.setAttribute('y2', pts.y2);
        svgEl.appendChild(line);

        // Label from
        const lblOffsetFrom = 18;
        const angle = Math.atan2(pts.y2 - pts.y1, pts.x2 - pts.x1);
        const lx1 = pts.x1 + Math.cos(angle) * lblOffsetFrom;
        const ly1 = pts.y1 + Math.sin(angle) * lblOffsetFrom - 6;

        const txt1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt1.setAttribute('x', lx1);
        txt1.setAttribute('y', ly1);
        txt1.setAttribute('class', 'line-label');
        txt1.textContent = rel.labelFrom;
        svgEl.appendChild(txt1);

        // Label to
        const lx2 = pts.x2 - Math.cos(angle) * lblOffsetFrom;
        const ly2 = pts.y2 - Math.sin(angle) * lblOffsetFrom - 6;

        const txt2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt2.setAttribute('x', lx2);
        txt2.setAttribute('y', ly2);
        txt2.setAttribute('class', 'line-label');
        txt2.textContent = rel.labelTo;
        svgEl.appendChild(txt2);

        // Dots at endpoints
        for (const p of [{x: pts.x1, y: pts.y1}, {x: pts.x2, y: pts.y2}]) {
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', p.x);
            c.setAttribute('cy', p.y);
            c.setAttribute('r', 3);
            c.setAttribute('class', 'rel-dot');
            svgEl.appendChild(c);
        }
    }
}

// ==================== PAN & ZOOM ====================
let scale = 1;
let panX = 0, panY = 0;
let isPanning = false, panStartX, panStartY, panOrigX, panOrigY;

function applyTransform() {
    canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

container.addEventListener('mousedown', (e) => {
    if (e.target !== container && e.target !== svgEl) return;
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panOrigX = panX;
    panOrigY = panY;
    container.classList.add('grabbing');
});

document.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    panX = panOrigX + (e.clientX - panStartX);
    panY = panOrigY + (e.clientY - panStartY);
    applyTransform();
});

document.addEventListener('mouseup', () => {
    isPanning = false;
    container.classList.remove('grabbing');
});

container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.08 : 0.08;
    scale = Math.min(3, Math.max(0.3, scale + delta));
    applyTransform();
}, { passive: false });

function zoomIn() { scale = Math.min(3, scale + 0.15); applyTransform(); }
function zoomOut() { scale = Math.max(0.3, scale - 0.15); applyTransform(); }
function resetView() { scale = 1; panX = 0; panY = 0; applyTransform(); }

// ==================== INIT ====================
entities.forEach(renderEntity);
requestAnimationFrame(() => {
    drawLines();
    applyTransform();
});
</script>
</body>
</html>
